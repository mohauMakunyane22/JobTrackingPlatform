<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Title</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>Job Application Tracking System</h1>
    <table>
      <thead>
        <tr>
          <th>Job Title</th>
          <th>Company</th>
          <th>Status</th>
          <th>Date Applied</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id ="tableBody">
    
      </tbody>
    </table>

    <button id="open-btn" class="open-btn">Add New Job</button>


    <dialog id="formDialog" class="form-popup">
      <form class="form-container" id="form">
        <h2>Add New Job</h2>
        <label for="jobTitle">Job Title:</label>
        <input type="text" id="jobTitle" name="jobTitle" required />
        
        <label for="company">Company:</label>
        <input type="text" id="company" name="company" required />
        
        <label for="status">Status:</label>
        <select id="status" name="status">
          <option value="applied">Applied</option>
          <option value="interview">Interview Scheduled</option>
          <option value="offer">Offer Received</option>
          <option value="rejected">Rejected</option>
        </select>
        
        <label for="dateApplied">Date Applied:</label>
        <input type="date" id="dateApplied" name="dateApplied" required />
        
        <button type="submit" id="submit-btn" class="form-btn">Submit</button>
        <button type="button" id="close-btn" class="form-btn">Close</button>
      </form>
      </dialog>
    </div>

    <dialog id="statusDialog">
  <form id="statusForm">
    <h3>Update Status</h3>

    <select id="editStatus">
      <option value="Applied">Applied</option>
      <option value="Interview">Interview Scheduled</option>
      <option value="Offer">Offer Received</option>
      <option value="Rejected">Rejected</option>
    </select>

    <button type="submit">Save</button>
    <button type="button" id="closeStatusDialog">Cancel</button>
  </form>
</dialog>
    <script src="index.js"></script>
  </body>
</html>
